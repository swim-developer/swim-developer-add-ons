<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 320" font-family="Arial, sans-serif">

  <!-- activemq-log-plugins -->
  <rect x="20" y="20" width="380" height="280" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="210" y="46" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d47a1">activemq-log-plugins</text>

  <rect x="50" y="60" width="320" height="40" rx="6" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
  <text x="210" y="85" text-anchor="middle" font-size="11" fill="#0d47a1">SWIM consumer ACKs message</text>

  <line x1="210" y1="100" x2="210" y2="120" stroke="#1976d2" stroke-width="1.5" marker-end="url(#ab)"/>

  <rect x="50" y="120" width="320" height="40" rx="6" fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
  <text x="210" y="145" text-anchor="middle" font-size="11" fill="#0d47a1">Plugin intercepts ACK callback</text>

  <line x1="210" y1="160" x2="210" y2="180" stroke="#1976d2" stroke-width="1.5" marker-end="url(#ab)"/>

  <rect x="50" y="180" width="320" height="40" rx="6" fill="#1565c0" stroke="#0d47a1" stroke-width="1"/>
  <text x="210" y="205" text-anchor="middle" font-size="11" fill="#ffffff">Publishes audit record to ACK_MONITOR</text>

  <rect x="50" y="240" width="320" height="44" rx="6" fill="none" stroke="#90caf9" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="210" y="258" text-anchor="middle" font-size="10" fill="#546e7a">Init container injected into</text>
  <text x="210" y="274" text-anchor="middle" font-size="10" fill="#546e7a">ActiveMQArtemis CR - spec.deploymentPlan.initImage</text>

  <!-- keycloak-swim-role-spi -->
  <rect x="460" y="20" width="380" height="280" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="650" y="46" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">keycloak-swim-role-spi</text>

  <rect x="490" y="60" width="320" height="40" rx="6" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
  <text x="650" y="85" text-anchor="middle" font-size="11" fill="#1b5e20">SWIM user created in Keycloak</text>

  <line x1="650" y1="100" x2="650" y2="120" stroke="#388e3c" stroke-width="1.5" marker-end="url(#ag)"/>

  <rect x="490" y="120" width="320" height="40" rx="6" fill="#c8e6c9" stroke="#388e3c" stroke-width="1"/>
  <text x="650" y="145" text-anchor="middle" font-size="11" fill="#1b5e20">SPI EventListener fires</text>

  <line x1="650" y1="160" x2="650" y2="180" stroke="#388e3c" stroke-width="1.5" marker-end="url(#ag)"/>

  <rect x="490" y="180" width="320" height="40" rx="6" fill="#2e7d32" stroke="#1b5e20" stroke-width="1"/>
  <text x="650" y="200" text-anchor="middle" font-size="11" fill="#ffffff">Creates AMQP roles in amq-broker client</text>
  <text x="650" y="214" text-anchor="middle" font-size="9" fill="#c8e6c9">john -&gt; john-swim-dnotam-v1-amq-role</text>

  <rect x="490" y="240" width="320" height="44" rx="6" fill="none" stroke="#a5d6a7" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="650" y="258" text-anchor="middle" font-size="10" fill="#546e7a">JAR mounted into Keycloak CR via Secret</text>
  <text x="650" y="274" text-anchor="middle" font-size="10" fill="#546e7a">Local test: compose.yml - Keycloak :9080</text>

  <defs>
    <marker id="ab" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#1976d2"/>
    </marker>
    <marker id="ag" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#388e3c"/>
    </marker>
  </defs>

</svg>
